<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>耕莘醫院麻醉部管理系統</title>
<style>
  body { font-family: "Microsoft JhengHei", system-ui, sans-serif; background: #f0f4f8; margin: 0;
         display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .box { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08);
         padding: 36px 32px; width: 320px; text-align: center; }
  h1 { font-size: 1.25rem; margin: 0 0 4px; color: #1a3c5e; }
  .sub { color: #789; font-size: .85rem; margin-bottom: 24px; }
  input { width: 100%; box-sizing: border-box; padding: 10px; font-size: 1.1rem; text-align: center;
          border: 1px solid #bcd; border-radius: 8px; }
  button { width: 100%; margin-top: 14px; padding: 10px; font-size: 1rem; border: 0; border-radius: 8px;
           background: #1a5e9e; color: #fff; cursor: pointer; }
  button:hover { background: #14497c; }
  #msg { margin-top: 12px; font-size: .9rem; min-height: 1.2em; }
  .err { color: #c0392b; }
</style>
</head>
<body>
<div class="box">
  <h1>耕莘醫院麻醉部管理系統</h1>
  <div class="sub">DPM-anes</div>
  <input type="password" id="passcode" placeholder="請輸入通行碼" autocomplete="off">
  <button onclick="login()">登入</button>
  <div id="msg"></div>
</div>
<script src="config.js?v=4"></script>
<script src="common.js?v=4"></script>
<script>
function login() {
  var code = document.getElementById('passcode').value.trim();
  var msg = document.getElementById('msg');
  if (!code) { msg.innerHTML = '<span class="err">請輸入通行碼</span>'; return; }
  msg.textContent = '驗證中…';
  jsonp({ action: 'auth', passcode: code }, function (res) {
    if (res && res.ok) {
      msg.textContent = res.label + '，登入成功';
      if (res.role === 'admin') gotoPage('dashboard.html', code);
      else gotoPage('form.html', code);
    } else {
      msg.innerHTML = '<span class="err">' + ((res && res.error) || '驗證失敗') + '</span>';
    }
  }, function () {
    msg.innerHTML = '<span class="err">連線失敗，請稍後再試</span>';
  });
}
document.getElementById('passcode').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
